# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

nfpms:
  - package_name: ganda
    homepage: "https://github.com/tednaleid/ganda"
    description: "fast cmd-line app that quickly requests millions of urls and saves/echoes the results"
    maintainer: "Ted Naleid <contact@naleid.com>"
    license: "Apache-2.0"
    formats:
      - deb
      - rpm

aurs:
  - name: ganda-bin
    homepage: "https://github.com/tednaleid/ganda"
    description: "fast cmd-line app that quickly requests millions of urls and saves/echoes the results"
    maintainers:
      - "Ted Naleid <contact@naleid.com>"
    license: "Apache-2.0"
    private_key: "{{ .Env.AUR_SSH_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/ganda-bin.git"
    depends:
      - glibc
    package: |-
      install -Dm755 ganda "${pkgdir}/usr/bin/ganda"

brews:
  - name: ganda
    homepage: "https://github.com/tednaleid/ganda"
    description: "fast cmd-line app that quickly request millions of urls and save/echo the results"
    repository:
      owner: tednaleid
      name: homebrew-ganda
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: tednaleid
      email: contact@naleid.com
    directory: Formula